<!-- ── Nanolutè-inspired premium loader (inline so it paints before Babel compiles) ── -->
<style id="cm-loader-style">
  #cm-loader {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 30px;
    background:
      radial-gradient(120% 90% at 50% 38%, #1b3a78 0%, #122248 55%, #0c1834 100%);
    font-family: 'Poppins', system-ui, sans-serif;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #cm-loader.is-done { opacity: 0; visibility: hidden; pointer-events: none; }
  #cm-loader .lipo { width: 168px; height: 168px; display: block; }
  #cm-loader .lipo .ring-beads { transform-origin: 100px 100px; animation: cmlSpin 9s linear infinite; }
  #cm-loader .lipo .ring-tails { transform-origin: 100px 100px; animation: cmlSpinR 13s linear infinite; }
  #cm-loader .lipo .arc { transform-origin: 100px 100px; animation: cmlSpin 1.5s cubic-bezier(0.65,0,0.35,1) infinite; }
  #cm-loader .lipo .core { transform-origin: 100px 100px; animation: cmlPulse 1.9s ease-in-out infinite; }
  #cm-loader .lipo .spec { animation: cmlSpec 1.9s ease-in-out infinite; }
  @keyframes cmlSpin { to { transform: rotate(360deg); } }
  @keyframes cmlSpinR { to { transform: rotate(-360deg); } }
  @keyframes cmlPulse {
    0%, 100% { transform: scale(1); opacity: 0.95; }
    50% { transform: scale(1.08); opacity: 1; }
  }
  @keyframes cmlSpec { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  #cm-loader .cml-word {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  #cm-loader .cml-name {
    font-size: 14px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase;
    color: #fff; padding-left: 0.32em;
  }
  #cm-loader .cml-bar {
    width: 132px; height: 2px; border-radius: 2px;
    background: rgba(255,255,255,0.16); overflow: hidden; position: relative;
  }
  #cm-loader .cml-bar::after {
    content: ""; position: absolute; inset: 0; width: 40%;
    border-radius: 2px;
    background: linear-gradient(90deg, transparent, #00B7F1, #6fa8e8, transparent);
    animation: cmlSweep 1.4s cubic-bezier(0.65,0,0.35,1) infinite;
  }
  @keyframes cmlSweep { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
  #cm-loader .cml-sub {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.5);
  }
  @media (prefers-reduced-motion: reduce) {
    #cm-loader .lipo .ring-beads,
    #cm-loader .lipo .ring-tails,
    #cm-loader .lipo .arc,
    #cm-loader .lipo .core,
    #cm-loader .lipo .spec,
    #cm-loader .cml-bar::after { animation: none !important; }
  }
</style>

<!-- dismiss the loader once React has rendered (with a graceful minimum display) -->
<script>
(function () {
  var ov = document.getElementById('cm-loader');
  if (!ov) return;
  var start = Date.now(), MIN = 1000, done = false;
  function finish() {
    if (done) return; done = true;
    var wait = Math.max(0, MIN - (Date.now() - start));
    setTimeout(function () {
      ov.classList.add('is-done');
      setTimeout(function () { if (ov && ov.parentNode) ov.parentNode.removeChild(ov); }, 650);
    }, wait);
  }
  var root = document.getElementById('root');
  var iv = setInterval(function () {
    if (root && root.children.length > 0) { clearInterval(iv); finish(); }
  }, 80);
  setTimeout(function () { clearInterval(iv); finish(); }, 9000);
})();
</script>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Concept Medical — Clinical Evidence (Print)</title>

<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="homepage.css" />
<link rel="icon" type="image/png" href="assets/mark-cm-blue.png" />

<style>
  /* ---------- PRINT-READY OVERRIDES ---------- */
  html, body { background: #fff; }

  /* de-stick the header & subnav so they flow inline on paper */
  .cm-header,
  .evidence-subnav {
    position: static !important;
    top: auto !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    background: #fff !important;
  }
  /* hero ambient blur not needed on paper, keep gradients */
  .hero-pill { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }

  @page { size: portrait; margin: 12mm; }

  @media print {
    *, *::before, *::after {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      animation-delay: -99s !important;
      animation-duration: .001s !important;
      animation-iteration-count: 1 !important;
      animation-fill-mode: both !important;
      animation-play-state: running !important;
      transition-duration: 0s !important;
    }

    /* freeze the marquee ticker at its start so it reads cleanly */
    .ticker-track { transform: none !important; animation: none !important; }
    .ticker { overflow: hidden !important; }

    /* don't split key blocks across pages */
    .trial-card,
    .ind-card,
    .cond-card,
    .pub-row,
    .h2h-card,
    .hero-chart-card,
    .impact-cell,
    .footer-subscribe,
    .cert-img-link,
    .step,
    .faq-item {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* give major sections a little breathing room before a break */
    section { break-inside: avoid-page; }

    /* major navy / colored sections start fresh where helpful */
    .impact-band,
    .pull-quote,
    #publications,
    .society-band {
      break-before: auto;
    }

    /* keep section headings with their content */
    .section-title, .section-head, h1, h2, h3 { break-after: avoid; }

    /* hide interactive-only chrome */
    .tweaks-toggle, .tweaks-panel, [data-tweaks-root],
    .audience-pill { display: none !important; }

    /* the contact CTA in header is fine, but the nav dropdown caret is noise */
    .nav-dropdown svg { display: none; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweak defaults so any component reading them resolves to the brand defaults -->
<script type="text/babel">
window.TWEAK_DEFAULTS = {
  "hcpAccent": "#1D4E9F",
  "patientAccent": "#00B7F1",
  "showTicker": true,
  "showEvidenceNav": true,
  "showSocietyBand": true,
  "showPullQuote": true,
  "italicAccents": true,
  "denseSpacing": false
};
</script>

<!-- component sources (charts, header/footer, hcp page) -->
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="hcp.jsx"></script>

<!-- static print render: HCP primary landing, no gate, no tweaks panel -->
<script type="text/babel">
  function PrintApp() {
    return (
      <React.Fragment>
        <Header audience="hcp" />
        <HCPHome />
        <Footer audience="hcp" />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);

  // auto-print once everything is laid out
  (function awaitReadyThenPrint() {
    const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
    fontsReady.then(function () {
      // give React a couple frames to mount + images to settle, then a safety delay
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          setTimeout(function () { window.print(); }, 600);
        });
      });
    });
  })();
</script>

</body>
</html>
